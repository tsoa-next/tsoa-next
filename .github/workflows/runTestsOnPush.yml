name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-package-impact:
    name: Detect Package Impact
    if: github.ref != 'refs/heads/changeset-release/main'
    runs-on: ubuntu-latest
    outputs:
      has-impact: ${{ steps.detect.outputs.has-impact }}

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - id: detect
        uses: ./.github/actions/detect-package-impact

  docs:
    name: Documentation
    if: github.ref != 'refs/heads/changeset-release/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm install --ignore-scripts

      - name: Build packages
        run: npm run build

      - name: Verify synchronized READMEs
        run: npm run sync:readmes:check

      - name: Build guides and API reference
        run: npm run docs:build
        env:
          BASE_URL: /
          SITE_URL: https://tsoa-next.dev
          API_REFERENCE_URL: /reference/

  coverage:
    name: Coverage
    needs: detect-package-impact
    if: github.ref != 'refs/heads/changeset-release/main' && needs.detect-package-impact.outputs.has-impact == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm install --ignore-scripts

      - name: Build
        run: npm run build

      - name: Generate coverage
        run: npm run coverage

      - name: Sonar Scan (attempt 1)
        id: sonar_scan_1
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        with:
          args: >
            -Dsonar.projectKey=tsoa-next_tsoa-next
            -Dsonar.organization=tsoa-next
            -Dsonar.projectName=tsoa-next
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=packages/cli/src,packages/runtime/src,packages/tsoa/src
            -Dsonar.tests=tests
            -Dsonar.exclusions=**/*.d.ts,**/dist/**,**/fixtures/**,coverage/**,site/**
            -Dsonar.test.inclusions=tests/**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Sonar Scan (attempt 2)
        id: sonar_scan_2
        if: steps.sonar_scan_1.outcome == 'failure'
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        with:
          args: >
            -Dsonar.projectKey=tsoa-next_tsoa-next
            -Dsonar.organization=tsoa-next
            -Dsonar.projectName=tsoa-next
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=packages/cli/src,packages/runtime/src,packages/tsoa/src
            -Dsonar.tests=tests
            -Dsonar.exclusions=**/*.d.ts,**/dist/**,**/fixtures/**,coverage/**,site/**
            -Dsonar.test.inclusions=tests/**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Sonar Scan (attempt 3)
        if: steps.sonar_scan_1.outcome == 'failure' && steps.sonar_scan_2.outcome == 'failure'
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        with:
          args: >
            -Dsonar.projectKey=tsoa-next_tsoa-next
            -Dsonar.organization=tsoa-next
            -Dsonar.projectName=tsoa-next
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=packages/cli/src,packages/runtime/src,packages/tsoa/src
            -Dsonar.tests=tests
            -Dsonar.exclusions=**/*.d.ts,**/dist/**,**/fixtures/**,coverage/**,site/**
            -Dsonar.test.inclusions=tests/**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error

  build:
    name: Build
    needs:
      - detect-package-impact
      - coverage
    if: always() && github.ref != 'refs/heads/changeset-release/main'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [22, 24, 26]
        os: [macos-latest, ubuntu-latest, windows-latest]
        typescript-version: ['^5.0.0']

    steps:
      - name: Skip when no impacted packages changed
        if: needs.detect-package-impact.outputs.has-impact != 'true'
        run: echo "No impacted packages changed; skipping build matrix."

      - name: Fail when coverage gate does not pass
        if: needs.detect-package-impact.outputs.has-impact == 'true' && needs.coverage.result != 'success'
        run: |
          echo "Coverage gate did not pass."
          exit 1

      - name: Checkout
        if: needs.detect-package-impact.outputs.has-impact == 'true' && needs.coverage.result == 'success'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node
        if: needs.detect-package-impact.outputs.has-impact == 'true' && needs.coverage.result == 'success'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set matrix TypeScript version
        if: needs.detect-package-impact.outputs.has-impact == 'true' && needs.coverage.result == 'success'
        run: |
          npm pkg set 'devDependencies.typescript=${{ matrix.typescript-version }}' --workspaces --include-workspace-root
          npm pkg delete devDependencies.typescript --workspace @tsoa-next/cli
          npm pkg set 'dependencies.typescript=${{ matrix.typescript-version }}' --workspace @tsoa-next/cli

      - name: Install
        if: needs.detect-package-impact.outputs.has-impact == 'true' && needs.coverage.result == 'success'
        run: npm install --ignore-scripts

      - name: Output ts version
        if: needs.detect-package-impact.outputs.has-impact == 'true' && needs.coverage.result == 'success'
        run: npm exec -- tsc --version

      - name: Output packages version
        if: needs.detect-package-impact.outputs.has-impact == 'true' && needs.coverage.result == 'success'
        run: npm ls --workspaces --depth=0

      - name: Build
        if: needs.detect-package-impact.outputs.has-impact == 'true' && needs.coverage.result == 'success'
        run: npm run build

      - name: Lint
        if: needs.detect-package-impact.outputs.has-impact == 'true' && needs.coverage.result == 'success'
        run: npm run lint

      - name: Test
        if: needs.detect-package-impact.outputs.has-impact == 'true' && needs.coverage.result == 'success'
        run: npm run test
