name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-package-impact:
    name: Detect Package Impact
    if: github.ref != 'refs/heads/changeset-release/main'
    runs-on: ubuntu-latest
    outputs:
      has-impact: ${{ steps.detect.outputs.has-impact }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - id: detect
        uses: ./.github/actions/detect-package-impact

  coverage:
    name: Coverage
    needs: detect-package-impact
    if: github.ref != 'refs/heads/changeset-release/main' && needs.detect-package-impact.outputs.has-impact == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm install --ignore-scripts

      - name: Generate coverage
        run: npm run coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error

  build:
    name: Build
    needs: detect-package-impact
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [22, 24, 25]
        os: [macos-latest, ubuntu-latest, windows-latest]
        typescript-version: ["^5.0.0"]

    steps:
      - name: Checkout
        if: github.ref != 'refs/heads/changeset-release/main' && needs.detect-package-impact.outputs.has-impact == 'true'
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        if: github.ref != 'refs/heads/changeset-release/main' && needs.detect-package-impact.outputs.has-impact == 'true'
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set override for matrix TypeScript version
        if: github.ref != 'refs/heads/changeset-release/main' && needs.detect-package-impact.outputs.has-impact == 'true'
        run: npm pkg set 'overrides.typescript=${{ matrix.typescript-version }}'

      - name: Install
        if: github.ref != 'refs/heads/changeset-release/main' && needs.detect-package-impact.outputs.has-impact == 'true'
        run: npm install --ignore-scripts

      - name: Output ts version
        if: github.ref != 'refs/heads/changeset-release/main' && needs.detect-package-impact.outputs.has-impact == 'true'
        run: npm exec -- tsc --version

      - name: Output packages version
        if: github.ref != 'refs/heads/changeset-release/main' && needs.detect-package-impact.outputs.has-impact == 'true'
        run: npm ls --workspaces --depth=0

      - name: Build
        if: github.ref != 'refs/heads/changeset-release/main' && needs.detect-package-impact.outputs.has-impact == 'true'
        run: npm run build

      - name: Lint
        if: github.ref != 'refs/heads/changeset-release/main' && needs.detect-package-impact.outputs.has-impact == 'true'
        run: npm run lint

      - name: Test
        if: github.ref != 'refs/heads/changeset-release/main' && needs.detect-package-impact.outputs.has-impact == 'true'
        run: npm run test
