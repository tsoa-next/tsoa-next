name: Build and Test

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-package-impact:
    name: Detect Package Impact
    if: github.ref != 'refs/heads/changeset-release/main'
    runs-on: ubuntu-latest
    outputs:
      has-impact: ${{ steps.detect.outputs.has-impact }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - id: detect
        uses: ./.github/actions/detect-package-impact

  build:
    name: Build
    needs: detect-package-impact
    if: github.ref != 'refs/heads/changeset-release/main' && needs.detect-package-impact.outputs.has-impact == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [22, 24, 25]
        os: [macos-latest, ubuntu-latest, windows-latest]
        typescript-version: ["^5.0.0"]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set override for matrix TypeScript version
        run: npm pkg set 'overrides.typescript=${{ matrix.typescript-version }}'

      - name: Install
        run: npm install --ignore-scripts

      - name: Output ts version
        run: npm exec -- tsc --version

      - name: Output packages version
        run: npm ls --workspaces --depth=0

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test
