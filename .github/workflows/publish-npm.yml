name: Publish packages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build workspace packages
        run: npm run build

      - name: Prepare GitHub Packages package
        id: github-package
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          publish_dir="$(mktemp -d "${RUNNER_TEMP}/github-package-XXXXXX")"

          cp -R ./packages/tsoa/. "${publish_dir}/"
          npm pkg set "name=@${owner}/tsoa-next" --prefix "${publish_dir}"
          npm pkg set "repository.type=git" --prefix "${publish_dir}"
          npm pkg set "repository.url=https://github.com/${GITHUB_REPOSITORY}.git" --prefix "${publish_dir}"
          npm pkg set "publishConfig.registry=https://npm.pkg.github.com" --prefix "${publish_dir}"

          echo "dir=${publish_dir}" >> "$GITHUB_OUTPUT"

      - name: Publish npm package
        uses: JS-DevTools/npm-publish@v4.1.5
        with:
          access: public
          package: ./packages/tsoa
          provenance: true
          token: ${{ secrets.NPM_TOKEN }}

      - name: Publish GitHub package
        uses: JS-DevTools/npm-publish@v4.1.5
        with:
          package: ${{ steps.github-package.outputs.dir }}
          registry: https://npm.pkg.github.com
          token: ${{ secrets.GITHUB_TOKEN }}
