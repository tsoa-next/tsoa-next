name: Publish Release

on:
  pull_request:
    types:
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write # Required for OIDC
  contents: write
  packages: write
  pull-requests: write

jobs:
  publish:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && startsWith(github.event.pull_request.head.ref, 'changeset-release/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Publish packages to npm
        id: changesets
        uses: changesets/action@v1.7.0
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare GitHub Packages package
        if: steps.changesets.outputs.published == 'true'
        id: github-package
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          publish_dir="$(mktemp -d "${RUNNER_TEMP}/github-package-XXXXXX")"

          cp -R ./packages/tsoa/. "${publish_dir}/"
          npm pkg set "name=@${owner}/tsoa-next" --prefix "${publish_dir}"
          npm pkg set "repository.type=git" --prefix "${publish_dir}"
          npm pkg set "repository.url=https://github.com/${GITHUB_REPOSITORY}.git" --prefix "${publish_dir}"
          npm pkg set "publishConfig.registry=https://npm.pkg.github.com" --prefix "${publish_dir}"

          echo "dir=${publish_dir}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub package
        if: steps.changesets.outputs.published == 'true'
        uses: JS-DevTools/npm-publish@v4.1.5
        with:
          package: ${{ steps.github-package.outputs.dir }}
          registry: https://npm.pkg.github.com
          token: ${{ secrets.GITHUB_TOKEN }}
