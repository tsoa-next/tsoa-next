name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0

      - name: Setup Node
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build packages
        run: npm run build

      - name: Build guides and API reference
        run: npm run docs:build
        env:
          BASE_URL: /
          SITE_URL: https://tsoa-next.dev
          API_REFERENCE_URL: /reference/

      - name: Assemble site artifact
        run: |
          rm -rf _site
          mkdir -p _site/docs
          cp -R site/guide-docs/.vitepress/dist/. _site/
          cp -R site/guide-docs/.vitepress/dist/. _site/docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
