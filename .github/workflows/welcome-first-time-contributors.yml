name: Welcome first time contributors

on:
  pull_request_target:
    types:
      - opened
  issues:
    types:
      - opened

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const actor = context.payload.sender?.login;
            const issueNumber = context.issue.number;
            const isPullRequest = Boolean(context.payload.pull_request);
            const isIssue = Boolean(context.payload.issue) && !isPullRequest;

            if (!actor || !issueNumber || (!isIssue && !isPullRequest)) {
              core.setFailed('Unsupported event payload for first-time welcome workflow.');
              return;
            }

            const authoredItems = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: actor,
              state: 'all',
              per_page: 100,
            });

            const hasPreviousMatch = authoredItems.some(item => {
              const isPriorItem = item.number < issueNumber;
              const itemIsPullRequest = Boolean(item.pull_request);

              return isPriorItem && (isPullRequest ? itemIsPullRequest : !itemIsPullRequest);
            });

            if (hasPreviousMatch) {
              core.info(`Skipping welcome comment for ${actor}; prior matching contribution found.`);
              return;
            }

            const body = isPullRequest
              ? [
                  `Hello there @${actor} 👋`,
                  '',
                  'Thank you and congrats 🎉 for opening your first PR on this project.✨',
                  '',
                  'We will review the following PR soon! 👀',
                ].join('\n')
              : [
                  `Hello there @${actor} 👋`,
                  '',
                  'Thank you for opening your very first issue in this project.',
                  '',
                  'We will try to get back to you as soon as we can. 👀',
                ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
