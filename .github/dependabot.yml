version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 8
    versioning-strategy: increase-if-necessary
    rebase-strategy: disabled
    cooldown:
      default-days: 3
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 2
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    pull-request-branch-name:
      separator: "-"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    rebase-strategy: disabled
    cooldown:
      default-days: 2
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 1
    commit-message:
      prefix: chore(ci)
    pull-request-branch-name:
      separator: "-"
    groups:
      github-actions-non-major:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
